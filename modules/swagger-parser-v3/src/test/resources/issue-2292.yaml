openapi: "3.0.3"
info:
  title: Example Reference Demo API
  version: "1.0"
paths:
  /users:
    post:
      summary: Create a user
      parameters:
        - name: filter
          in: query
          content:
            application/json:
              schema:
                type: object
              examples:
                simpleFilter:
                  $ref: "#/components/examples/FilterExample"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
            examples:
              defaultUser:
                $ref: "#/components/examples/UserExample"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              examples:
                successResponse:
                  $ref: "#/components/examples/UserExample"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
  examples:
    UserExample:
      summary: A sample user
      value:
        id: "12345"
        name: John Doe
    FilterExample:
      summary: A sample filter
      value:
        status: active
