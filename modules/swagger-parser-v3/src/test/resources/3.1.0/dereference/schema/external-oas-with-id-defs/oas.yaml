$id: 'https://spec.openapis.org/oas/3.1/schema/2022-10-07'
$schema: 'https://json-schema.org/draft/2020-12/schema'
type: object
properties:
  info:
    $ref: '#/$defs/info'
  servers:
    type: array
    items:
      $ref: '#/$defs/server'
$ref: '#/$defs/extensions'
$defs:
  info:
    type: object
    properties:
      title:
        type: string
    required:
      - title
  server:
    type: object
    properties:
      url:
        type: string
    required:
      - url
  extensions:
    patternProperties:
      '^x-': true
