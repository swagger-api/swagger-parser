openapi: 3.1.0
info:
  title: Recursive dynamicRef
  version: 1.0.0
paths: {}
components:
  schemas:
    BaseCategory:
      $dynamicAnchor: category
      type: object
      properties:
        id:
          type: string
        children:
          type: array
          items:
            $dynamicRef: "#category"
    LocalizedCategory:
      $dynamicAnchor: category
      allOf:
        - $ref: "#/components/schemas/BaseCategory"
        - type: object
          required: [displayName, locale]
          properties:
            displayName:
              type: string
            locale:
              type: string
