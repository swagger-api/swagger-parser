openapi: 3.0.1
info:
  title: Test API for Issue 2157
  version: 1.0.0
paths:
  /pet:
    put:
      requestBody:
        description: Update an existent pet in the store
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/Pet'
      responses:
        '200':
          description: OK
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: doggie
      additionalProperties:
        type: string
